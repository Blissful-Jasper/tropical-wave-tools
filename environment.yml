name: twave
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy<2
  - pandas>=1.4
  - xarray>=2022.3
  - scipy>=1.9
  - matplotlib>=3.5
  - bottleneck
  - cftime
  - numexpr
  - netcdf4
  - h5netcdf
  - dask
  - joblib
  - psutil
  - pytest>=7.1
  - pytest-cov
  - ruff
  - python-build
  - twine
  - mkdocs>=1.6
  - mkdocs-material>=9.5
  - mkdocstrings-python>=1.10
  - streamlit>=1.35
  - cartopy
  - pip:
      - global-land-mask>=1.0.0
      - xeofs>=3.0
      - -e .
