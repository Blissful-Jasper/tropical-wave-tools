site_name: Tropical Wave Tools
site_url: https://Blissful-Jasper.github.io/tropical-wave-tools/
repo_url: https://github.com/Blissful-Jasper/tropical-wave-tools
repo_name: Blissful-Jasper/tropical-wave-tools

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: light blue
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
    - search.highlight

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 使用指南: user-guide.md
  - 案例:
      - 总览: examples.md
      - OLR Showcase: gallery/olr-showcase.md
      - Case 01: gallery/sample-preview.md
      - Case 02: gallery/wk-spectrum-case.md
      - Case 03: gallery/kelvin-hovmoller-case.md
      - Case 04: gallery/multiwave-spatial-case.md
      - Case 05: gallery/variance-fraction-case.md
      - Case 06: gallery/wind-diagnostics-case.md
      - Case 07: gallery/eof-svd-case.md
      - Case 08: gallery/lead-lag-case.md
      - Case 09: gallery/seasonal-trend-case.md
      - Case 10: gallery/paper-hovmoller-case.md
  - API:
      - 总览: api/index.md
      - 函数模板: api/function-template.md
  - 方法与笔记:
      - 方法总览: theory/index.md
      - WK 与波动诊断流程: theory/wk-diagnostics.md
      - Notes 总览: notes/index.md
      - M01 数据标准化与异常场: notes/method-01-data-standardization.md
      - M02 WK 频率-波数谱: notes/method-02-wk-spectrum.md
      - M03 频率-波数滤波: notes/method-03-wave-filtering.md
      - M04 Hovmoller 与合成: notes/method-04-hovmoller-composite.md
      - M05 EOF 与 PC 回归: notes/method-05-eof-regression.md
      - M06 方差与风场诊断: notes/method-06-variance-wind-diagnostics.md
      - 笔记模板: notes/research-note-template.md
      - 项目结构: structure.md
      - 迁移说明: migration.md
      - 部署发布: deployment.md
      - 改版蓝图: blueprint.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
