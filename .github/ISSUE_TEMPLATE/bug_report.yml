name: Bug report
description: 报告一个可复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供最小复现步骤、输入数据和命令
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: Python 版本、系统、依赖版本等

